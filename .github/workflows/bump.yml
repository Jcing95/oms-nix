name: Bump oms

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Update nixpkgs input
        run: nix flake update

      - name: Update oms
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix run nixpkgs#nix-update -- --flake oms

      - name: Verify build
        run: nix build .#default --no-link --print-build-logs

      - id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: bump oms and refresh flake.lock"
          title: "chore: bump oms"
          body: |
            Automated bump produced by `nix flake update` + `nix-update`.

            - Refreshes `flake.lock` (nixpkgs)
            - Updates `package.nix` to the latest upstream release of
              [`codesphere-cloud/oms`](https://github.com/codesphere-cloud/oms)

            Build verified with `nix build .#default` before the PR was opened.
          branch: bump-oms
          delete-branch: true
          labels: |
            dependencies
            automated

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --squash --auto "${{ steps.cpr.outputs.pull-request-number }}"

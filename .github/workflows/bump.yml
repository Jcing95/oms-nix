name: Bump oms

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Update oms
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix run nixpkgs#nix-update -- --flake oms

      - name: Verify build
        run: nix build .#default --no-link --print-build-logs

      - uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "bump oms to latest release"
          title: "chore: bump oms"
          body: |
            Automated bump produced by `nix-update`.

            Updates `package.nix` to the latest upstream release of
            [`codesphere-cloud/oms`](https://github.com/codesphere-cloud/oms).
          branch: bump-oms
          delete-branch: true
          labels: |
            dependencies
            automated
